<svg width="1200" height="460" viewBox="0 0 1200 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AlphaLoom compile-gated agent loop</title>
  <desc id="desc">A visual blueprint is compiled, risk checked, executed, recorded, evaluated, and improved by a copilot evolution loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061014"/>
      <stop offset="0.48" stop-color="#0A1B24"/>
      <stop offset="1" stop-color="#07111A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="48" y1="128" x2="1160" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#30E7D5"/>
      <stop offset="0.5" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FACC15"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.17 0 0 0 0 0.9 0 0 0 0 0.82 0 0 0 0.28 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10V2Z" fill="#76E4F7"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10V2Z" fill="#FACC15"/>
    </marker>
    <style>
      .title { font: 800 26px "Segoe UI", Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #F8FAFC; }
      .sub { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #9FB4C0; }
      .tiny { font: 600 11px "Segoe UI", Arial, sans-serif; fill: #B6F3EE; }
      .card { fill: #08141C; fill-opacity: 0.88; stroke: #7DD3FC; stroke-opacity: 0.38; stroke-width: 1.4; }
      .goldCard { fill: #1F180A; fill-opacity: 0.92; stroke: #FACC15; stroke-opacity: 0.78; stroke-width: 1.6; }
    </style>
  </defs>

  <rect width="1200" height="460" rx="28" fill="url(#bg)"/>
  <path d="M50 92C190 48 330 80 476 56C640 29 735 65 868 50C1018 33 1110 70 1160 42" stroke="#123D4B" stroke-width="2" opacity="0.7"/>
  <path d="M34 407C190 350 335 390 493 365C654 339 777 392 921 352C1046 318 1120 353 1174 317" stroke="#143D35" stroke-width="2" opacity="0.72"/>

  <text x="58" y="56" class="title">Compile-gated trading agent loop</text>
  <text x="58" y="79" class="sub">A visual graph becomes executable only after the compiler proves cost, causality, and risk-stamp contracts.</text>

  <g filter="url(#softGlow)">
    <rect class="card" x="48" y="128" width="140" height="118" rx="16"/>
    <text x="68" y="164" class="label">Blueprint</text>
    <text x="68" y="187" class="label">Studio</text>
    <text x="68" y="215" class="sub">typed .loom graph</text>

    <rect class="card" x="210" y="128" width="140" height="118" rx="16"/>
    <text x="234" y="175" class="label">Compiler</text>
    <text x="234" y="205" class="sub">pins, cycles, cost</text>

    <rect class="goldCard" x="372" y="128" width="140" height="118" rx="16"/>
    <text x="397" y="166" class="label">RiskGate</text>
    <text x="397" y="194" class="tiny">only legal order path</text>
    <text x="397" y="215" class="sub">risk_stamped_signal</text>

    <rect class="card" x="534" y="128" width="140" height="118" rx="16"/>
    <text x="555" y="164" class="label">Runtime</text>
    <text x="555" y="187" class="label">Broker</text>
    <text x="555" y="215" class="sub">fills, stops, equity</text>

    <rect class="card" x="696" y="128" width="140" height="118" rx="16"/>
    <text x="721" y="175" class="label">Recorder</text>
    <text x="721" y="205" class="sub">full node I/O replay</text>

    <rect class="card" x="858" y="128" width="140" height="118" rx="16"/>
    <text x="891" y="166" class="label">Eval Lab</text>
    <text x="891" y="194" class="tiny">falsifiable scoring</text>
    <text x="891" y="215" class="sub">fidelity, ablation</text>

    <rect class="card" x="1020" y="128" width="140" height="118" rx="16"/>
    <text x="1045" y="164" class="label">Copilot</text>
    <text x="1045" y="187" class="label">Evolution</text>
    <text x="1045" y="215" class="sub">mutate and repair</text>
  </g>

  <path d="M188 187H208" stroke="#76E4F7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M350 187H370" stroke="#76E4F7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M512 187H532" stroke="#FACC15" stroke-width="2.6" marker-end="url(#arrowGold)"/>
  <path d="M674 187H694" stroke="#76E4F7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M836 187H856" stroke="#76E4F7" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M998 187H1018" stroke="#76E4F7" stroke-width="2.4" marker-end="url(#arrow)"/>

  <path d="M1090 260C1090 332 905 352 604 352C268 352 118 332 118 262" stroke="url(#cyan)" stroke-width="2.5" stroke-dasharray="7 9" marker-end="url(#arrow)" opacity="0.88"/>
  <text x="458" y="339" class="tiny">compile errors become repair hints; held-out winners feed the next blueprint</text>

  <rect x="76" y="374" width="320" height="54" rx="14" fill="rgba(5, 15, 20, 0.9)" stroke="rgba(125, 211, 252, 0.28)"/>
  <text x="98" y="397" class="tiny">TYPE CONTRACT</text>
  <text x="98" y="417" class="sub">raw signal cannot enter ExecuteOrder</text>

  <rect x="440" y="374" width="320" height="54" rx="14" fill="rgba(5, 15, 20, 0.9)" stroke="rgba(125, 211, 252, 0.28)"/>
  <text x="462" y="397" class="tiny">OFFLINE REPLAY</text>
  <text x="462" y="417" class="sub">recorded LLM calls, zero quota demo</text>

  <rect x="804" y="374" width="320" height="54" rx="14" fill="rgba(5, 15, 20, 0.9)" stroke="rgba(125, 211, 252, 0.28)"/>
  <text x="826" y="397" class="tiny">REAL DATA CHECK</text>
  <text x="826" y="417" class="sub">OKX candles, exact window, honest caveats</text>
</svg>
