<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AlphaLoom type gate</title>
  <desc id="desc">A raw signal must pass position sizing and RiskGate before ExecuteOrder accepts it.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111A"/>
      <stop offset="0.55" stop-color="#0B1729"/>
      <stop offset="1" stop-color="#061014"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.88 0 0 0 0 0.75 0 0 0 0.32 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#67E8F9"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#FACC15"/>
    </marker>
    <style>
      .title { font: 800 26px "Segoe UI", Arial, sans-serif; fill: #F8FAFC; }
      .label { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #E2E8F0; }
      .sub { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #8CA3B8; }
      .tiny { font: 700 11px "Segoe UI", Arial, sans-serif; fill: #A7F3D0; }
      .card { fill: #081421; stroke: #2A5B85; stroke-width: 1.6; }
      .risk { fill: #1E1A0B; stroke: #FACC15; stroke-width: 2; }
      .bad { stroke: #FB7185; stroke-width: 2.8; stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="1120" height="360" rx="24" fill="url(#bg)"/>
  <text x="44" y="52" class="title">Typed blueprint guardrail</text>
  <text x="44" y="78" class="sub">ExecuteOrder cannot receive a raw LLM signal. The graph must produce a risk_stamped_signal.</text>

  <g filter="url(#glow)">
    <rect class="card" x="56" y="138" width="160" height="94" rx="16"/>
    <text x="84" y="173" class="label">Signal</text>
    <text x="84" y="203" class="sub">raw_signal</text>

    <rect class="card" x="286" y="138" width="170" height="94" rx="16"/>
    <text x="313" y="173" class="label">Sizer</text>
    <text x="313" y="203" class="sub">sized_signal</text>

    <rect class="risk" x="528" y="126" width="184" height="118" rx="18"/>
    <text x="561" y="168" class="label">RiskGate</text>
    <text x="561" y="198" class="tiny">only legal stamp issuer</text>
    <text x="561" y="220" class="sub">risk_stamped_signal</text>

    <rect class="card" x="794" y="138" width="198" height="94" rx="16"/>
    <text x="825" y="173" class="label">ExecuteOrder</text>
    <text x="825" y="203" class="sub">accepts stamped only</text>
  </g>

  <path d="M216 185H284" stroke="#67E8F9" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M456 185H526" stroke="#67E8F9" stroke-width="2.8" marker-end="url(#arrow)"/>
  <path d="M712 185H792" stroke="#FACC15" stroke-width="3" marker-end="url(#arrowGold)"/>

  <path class="bad" d="M136 250C265 318 650 316 893 244"/>
  <text x="326" y="309" class="sub" fill="#FB7185">raw signal bypass -> compile error: TYPE_MISMATCH</text>
  <circle cx="893" cy="244" r="18" fill="#2A0D16" stroke="#FB7185" stroke-width="2"/>
  <path d="M884 235L902 253M902 235L884 253" stroke="#FB7185" stroke-width="3" stroke-linecap="round"/>
</svg>
